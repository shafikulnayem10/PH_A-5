<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Issues Tracker</title>
   <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap" rel="stylesheet" />

  <!-- Tailwind & DaisyUI -->
  <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

 
</head>

<body class="min-h-screen bg-base-200 font-[Outfit] flex items-center justify-center px-4">

  <div class="w-full max-w-md">

    <!-- Logo Section Starts -->
    <div class="text-center mb-10">
      <div class="flex items-center justify-center gap-3 mb-4">
        <img src="./assets/github-logo.png" alt="GitHub Logo" class="w-16 h-16" />
      </div>
      <h1 class="text-3xl font-bold mt-4">GitHub Issues Tracker</h1>
      <p class="text-gray-500 text-sm mt-2">
        Sign in to manage your issues
        
      </p>
    </div>
    <!-- Logo Section Ends -->

      <!-- Sign In Card Section Starts -->
     <div class="card bg-base-100 shadow-2xl">
      <div class="card-body">

        <h2 class="card-title text-xl font-bold mb-2">Sign In</h2>

        <fieldset class="fieldset space-y-1">

          <label class="label font-semibold">Username</label>
          <input
            id="input-username"
            type="text"
            class="input rounded-full bg-base-200 w-full"
            placeholder="Enter your username"
            value="admin"
            required
          />

          <br />

          <label class="label font-semibold">Password</label>
          <input
            id="input-password"
            type="password"
            class="input rounded-full bg-base-200 w-full"
            placeholder="Enter your password"
            
            required
          />

          <button id="login-btn" class="btn btn-primary mt-6 rounded-full w-full">
            <i class="fa-solid fa-right-to-bracket"></i> Sign In
          </button>

        </fieldset>

        <!-- Demo Credentials -->
        <div class="mt-4 p-3 bg-base-200 rounded-xl text-sm text-gray-500 text-center">
          <p class="font-semibold text-gray-600 mb-1">Demo Credentials</p>
          <p>Username: <span class="font-mono font-bold text-gray-700">admin</span></p>
          <p>Password: <span class="font-mono font-bold text-gray-700 ">admin123</span></p>
        </div>

      </div>
    </div>
       <!-- Sign In Card Section Ends -->


    

  </div>

  <script src="./scripts/login.js"></script>
  
  
</body>
</html>
