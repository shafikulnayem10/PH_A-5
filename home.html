<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    
  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap" rel="stylesheet" />

  <!-- Tailwind & DaisyUI -->
  <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

</head>
<body class="min-h-screen bg-base-200 font-[Outfit]">

  <!-- NAVBAR SECTION STARTS -->
  <header class=" gap-2 ">
    <div class="navbar bg-base-100 shadow-sm px-9">
      <div class="navbar-start">
        <a class="flex items-center gap-2 cursor-pointer">
          <img src="./assets/github-logo.png" alt="GitHub Logo" class="w-8 h-8" />
          <span class="text-lg font-bold">Github Issues Tracker</span>
        </a>
      </div>
      <div class="navbar-end gap-3">
      
        <div class="join  md:flex">
          <input
            id="input-search"
            type="text"
            placeholder="Search issues..."
            class="input input-sm join-item bg-base-200 w-56"
          />
          <button id="btn-search" class="btn btn-sm btn-primary join-item">
            <i class="fa-solid fa-magnifying-glass"></i>
          </button>
        </div>
     
       
      </div>
    </div>
  </header>
  <!-- NAVBAR SECTION ENDS -->


 


</body>
</html>
